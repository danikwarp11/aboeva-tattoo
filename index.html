<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Абоева | Тату Мастер</title>
    <!-- Подключаем премиальные шрифты Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Общий контейнер, который защищает сайт от расползания при изменении масштаба -->
    <div class="site-wrapper">

        <!-- Шапка сайта -->
        <header class="header">
            <div class="logo">АБОЕВА</div>
            <nav class="nav">
                <a href="#portfolio">Портфолио</a>
                <a href="#contacts">Контакты</a>
            </nav>
            <button class="btn ms_booking" data-url="https://yclients.com">Записаться</button>
        </header>

        <!-- Главный баннер с сеткой из 4 вертикальных фото -->
        <section class="hero-section">
            <div class="hero-bg-grid">
                <div class="hero-img-item"><img src="hero1.jpg" alt="Тату процесс 1"></div>
                <div class="hero-img-item"><img src="hero2.jpg" alt="Тату процесс 2"></div>
                <div class="hero-img-item"><img src="hero3.jpg" alt="Тату процесс 3"></div>
                <div class="hero-img-item"><img src="hero4.jpg" alt="Тату процесс 4"></div>
            </div>
            <div class="hero-content">
                <h1>Художественная татуировка</h1>
                <p>Индивидуальные эскизы. Безопасность. Твой стиль.</p>
                <a href="#portfolio" class="btn-secondary">Смотреть работы</a>
            </div>
        </section>

        <!-- Галерея (Портфолио на 5 фото с премиум-раскладкой) -->
        <section id="portfolio" class="portfolio">
            <h2 class="section-title">Мои работы</h2>
            <div class="grid-container">
                <div class="grid-item item-large"><img src="photo1.jpg" alt="Тату Абоева" onclick="openLightbox(this.src)"></div>
                <div class="grid-item item-large"><img src="photo2.jpg" alt="Тату Абоева" onclick="openLightbox(this.src)"></div>
                <div class="grid-item"><img src="photo3.jpg" alt="Тату Абоева" onclick="openLightbox(this.src)"></div>
                <div class="grid-item"><img src="photo4.jpg" alt="Тату Абоева" onclick="openLightbox(this.src)"></div>
                <div class="grid-item"><img src="photo5.jpg" alt="Тату Абоева" onclick="openLightbox(this.src)"></div>
            </div>
        </section>

        <!-- Окно плавного просмотра увеличенного фото (Lightbox) -->
        <div id="lightbox" class="lightbox" onclick="closeLightbox()">
            <img id="lightbox-img" src="" alt="Увеличенное фото">
        </div>

        <!-- Чистая форма заявки (без action и method, управляется через JS) -->
        <section id="contacts" class="contacts">
            <h2 class="section-title">Нужен уникальный эскиз?</h2>
            <p>Оставьте заявку, и я свяжусь с вами для обсуждения идеи</p>
            <form id="tg-form" class="contact-form">
                <input type="text" name="name" placeholder="Ваше имя" required>
                <input type="tel" name="phone" placeholder="Номер телефона" required>
                <textarea name="idea" placeholder="Опишите вашу идею" rows="4"></textarea>
                <button type="submit" class="btn">Обсудить идею</button>
            </form>
        </section>

    </div> <!-- Конец site-wrapper -->

    <!-- Скрипт виджета онлайн-записи YCLIENTS -->
    <script type="text/javascript" src="//://yclients.com" charset="UTF-8"></script>
    <script src="script.js"></script>
</body>
</html>
